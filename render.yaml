services:
  - type: web
    name: proup-backend
    runtime: node
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm db:generate && pnpm db:migrate:deploy && pnpm build:server
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /api/ping
